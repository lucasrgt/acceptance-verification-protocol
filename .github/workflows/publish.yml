name: publish

# Publishes both AVP reference implementations off one version tag (e.g. `v0.1.1`): Assay.Net to nuget.org and
# @aerofortress/assay (JS) to npm. Bump the version first (back: <Version> in assay.net/src/Assay.Net/Assay.Net.csproj;
# front: assay/package.json), then tag. The two jobs are independent. nuget auth is Trusted Publishing (OIDC — no
# stored key) via NuGet/login@v1, bound to a nuget.org policy (owner lucasrgt, repo acceptance-verification-protocol,
# workflow publish.yml). npm auth is the NPM_TOKEN secret (an automation token for the @aerofortress scope).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  nuget:
    name: pack + push Assay.Net to nuget.org
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC token for nuget.org Trusted Publishing
      contents: read # checkout
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: pack
        run: dotnet pack assay.net/src/Assay.Net/Assay.Net.csproj -c Release -o nupkgs
      # Trusted Publishing: exchange the GitHub OIDC token for a short-lived (1h) nuget.org key — no stored secret.
      # `user` is the public nuget.org profile name; the bound policy lives on nuget.org. Requested right before push.
      - name: nuget login (OIDC → temp key)
        uses: NuGet/login@v1
        id: login
        with:
          user: lucasrgt
      - name: push
        run: dotnet nuget push "nupkgs/*.nupkg" --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate

  npm:
    name: publish @aerofortress/assay to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: assay/package-lock.json
      - name: install
        working-directory: assay
        run: npm ci
      # Skip gracefully when NPM_TOKEN is unset (the nuget leg is independent and still ran) and when the version
      # is already on npm (the npm analogue of nuget's --skip-duplicate). prepublishOnly builds dist via tsup.
      - name: publish (skip if no token or version exists)
        working-directory: assay
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN not set — skipping npm publish (the nuget leg is independent and still ran)."
            exit 0
          fi
          ver=$(node -p "require('./package.json').version")
          if npm view "@aerofortress/assay@$ver" version >/dev/null 2>&1; then
            echo "@aerofortress/assay@$ver already on npm — skip"
          else
            npm publish
          fi
